<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #11433f 0%, #1a2a3a 50%, #165243 100%);
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-light: #f3f4f6;
            --accent-glow: linear-gradient(90deg, #10b981, #3b82f6);
        }
        body {
            background: var(--bg-gradient); min-height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; position: relative;
        }
        body::before, body::after {
            content: ''; position: absolute; width: 400px; height: 400px; border-radius: 50%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, rgba(0,0,0,0) 70%); z-index: 0; pointer-events: none;
        }
        body::before { top: 10%; left: 15%; }
        body::after { bottom: 10%; right: 15%; }
        .register-card {
            width: 520px; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            z-index: 1; transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .register-card:hover { transform: translateY(-5px); box-shadow: 0 25px 60px rgba(16, 185, 129, 0.15); }
        .card-header { background: transparent; color: var(--text-light); text-align: center; border-bottom: none; padding: 35px 20px 10px 20px; }
        .header-icon { font-size: 2.5rem; color: #fbbf24; margin-bottom: 10px; display: inline-block; filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.5)); }
        .card-header h2 { font-weight: 400; letter-spacing: 0.5px; margin-bottom: 5px; }
        .card-header p { color: rgba(255, 255, 255, 0.6); font-size: 0.9rem; }
        .card-body p { margin-bottom: 1.2rem; color: rgba(255, 255, 255, 0.85); font-size: 0.95rem; }
        .django-form-wrapper input {
            width: 100%; padding: 11px 16px; background: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important; border-radius: 10px !important; color: #ffffff !important; transition: all 0.3s ease;
        }
        .django-form-wrapper input:focus {
            background: rgba(0, 0, 0, 0.35) !important; outline: none !important; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.25) !important; border-color: #10b981 !important;
        }
        .btn-register {
            background: var(--accent-glow); border: none; color: white; width: 100%; padding: 12px;
            font-weight: 600; border-radius: 12px; position: relative; z-index: 1; transition: all 0.4s ease; overflow: hidden; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .btn-register::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, #3b82f6, #10b981); opacity: 0; z-index: -1; transition: opacity 0.4s ease;
        }
        .btn-register:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4); color: white; }
        .btn-register:hover::before { opacity: 1; }
        .footer-text { color: rgba(255, 255, 255, 0.6); font-size: 0.9rem; }
        .login-link { color: #3b82f6; text-decoration: none; font-weight: 600; transition: color 0.2s ease; }
        .login-link:hover { color: #60a5fa; text-decoration: underline; }
        .terms-text { font-size: 0.75rem; color: rgba(255, 255, 255, 0.4); margin-top: 25px; line-height: 1.4; }
        ul.errorlist { color: #fca5a5; font-size: 0.85rem; padding-left: 0; list-style: none; margin-top: 5px; }
    </style>
</head>
<body>
<div class="card register-card">
    <div class="card-header">
        <div class="header-icon"><i class="bi bi-key-fill"></i></div>
        <h2>Register</h2>
        <p>Create your profile to get started</p>
    </div>
    <div class="card-body p-4">
        <form method="POST">
            {% csrf_token %}
            <div class="django-form-wrapper">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn btn-register mt-2">Register</button>
        </form>
        <div class="text-center mt-4 footer-text">
            Already have an account? <a href="/login/" class="login-link">Login</a>
        </div>
        <div class="text-center terms-text">
            © 2026 SecurePort Services | All Rights Reserved.<br>
            By registering, you agree to our Terms of Service.
        </div>
    </div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const inputs = document.querySelectorAll('.django-form-wrapper input');
        inputs.forEach(input => {
            input.classList.add('form-control');
            let fieldName = input.getAttribute('name');
            if (fieldName) {
                let formattedName = fieldName.replace('_', ' ');
                formattedName = formattedName.charAt(0).toUpperCase() + formattedName.slice(1);
                input.setAttribute('placeholder', `Enter your ${formattedName.toLowerCase()}`);
            }
        });
    });
</script>
</body>
</html>
