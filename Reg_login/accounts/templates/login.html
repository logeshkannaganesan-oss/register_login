<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #11433f 0%, #1a2a3a 50%, #165243 100%);
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-light: #f3f4f6;
            --accent-glow: linear-gradient(90deg, #10b981, #3b82f6);
        }
        body {
            background: var(--bg-gradient); min-height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; position: relative;
        }
        body::before, body::after {
            content: ''; position: absolute; width: 400px; height: 400px; border-radius: 50%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, rgba(0,0,0,0) 70%); z-index: 0; pointer-events: none;
        }
        body::before { top: 15%; right: 15%; }
        body::after { bottom: 15%; left: 15%; }
        .login-card {
            width: 450px; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            z-index: 1; transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .login-card:hover { transform: translateY(-5px); box-shadow: 0 25px 60px rgba(16, 185, 129, 0.15); }
        .card-header { background: transparent; color: var(--text-light); text-align: center; border-bottom: none; padding: 35px 20px 10px 20px; }
        .header-icon { font-size: 2.5rem; color: #fbbf24; margin-bottom: 10px; display: inline-block; filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.5)); }
        .card-header h2 { font-weight: 400; letter-spacing: 0.5px; margin-bottom: 5px; }
        .card-header p { color: rgba(255, 255, 255, 0.6); font-size: 0.9rem; }
        .form-control {
            width: 100%; padding: 12px 16px; background: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important; border-radius: 10px !important; color: #ffffff !important; transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(0, 0, 0, 0.35) !important; outline: none !important; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.25) !important; border-color: #10b981 !important;
        }
        .error-alert { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #fca5a5; border-radius: 10px; font-size: 0.9rem; padding: 10px 15px; margin-bottom: 20px; }
        .btn-login {
            background: var(--accent-glow); border: none; color: white; width: 100%; padding: 12px;
            font-weight: 600; border-radius: 12px; position: relative; z-index: 1; transition: all 0.4s ease; overflow: hidden; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .btn-login::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, #3b82f6, #10b981); opacity: 0; z-index: -1; transition: opacity 0.4s ease;
        }
        .btn-login:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4); color: white; }
        .btn-login:hover::before { opacity: 1; }
        .footer-text { color: rgba(255, 255, 255, 0.6); font-size: 0.9rem; }
        .register-link { color: #3b82f6; text-decoration: none; font-weight: 600; transition: color 0.2s ease; }
        .register-link:hover { color: #60a5fa; text-decoration: underline; }
        .terms-text { font-size: 0.75rem; color: rgba(255, 255, 255, 0.4); margin-top: 30px; line-height: 1.4; }
    </style>
</head>
<body>
<div class="card login-card">
    <div class="card-header">
        <div class="header-icon"><i class="bi bi-shield-lock-fill"></i></div>
        <h2>Welcome Back</h2>
        <p>Please log in to your account</p>
    </div>
    <div class="card-body p-4">
        {% if error %}
        <div class="error-alert d-flex align-items-center">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <div>{{ error }}</div>
        </div>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-4">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-login">Login</button>
        </form>
        <div class="text-center mt-4 footer-text">
            Don't have an account? <a href="/" class="register-link">Register</a>
        </div>
        <div class="text-center terms-text">
            © 2026 SecurePort Services | All Rights Reserved.<br>
            By logging in, you agree to our security protocols.
        </div>
    </div>
</div>
</body>
</html>
