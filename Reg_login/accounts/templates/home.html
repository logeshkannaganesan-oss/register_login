<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #11433f 0%, #1a2a3a 50%, #165243 100%);
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-light: #f3f4f6;
            --accent-gradient: linear-gradient(90deg, #10b981, #3b82f6);
        }
        body {
            background: var(--bg-gradient); min-height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; position: relative; margin: 0;
        }
        body::before, body::after {
            content: ''; position: absolute; width: 500px; height: 500px; border-radius: 50%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.12) 0%, rgba(0,0,0,0) 70%); z-index: 0; pointer-events: none;
        }
        body::before { top: -10%; left: -10%; }
        body::after { bottom: -10%; right: -10%; }
        .dashboard-card {
            width: 600px; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 28px; box-shadow: 0 25px 55px rgba(0, 0, 0, 0.45);
            z-index: 1; transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .dashboard-card:hover { transform: translateY(-4px); box-shadow: 0 30px 65px rgba(16, 185, 129, 0.15); }
        .avatar-panel {
            width: 85px; height: 85px; background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px auto;
            color: #10b981; font-size: 2.2rem; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2); position: relative;
        }
        .avatar-panel::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 14px; height: 14px; background-color: #10b981; border: 2px solid #1a2a3a; border-radius: 50%; }
        .welcome-title { color: var(--text-light); font-weight: 400; letter-spacing: -0.5px; }
        .username-highlight { background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .status-text { color: rgba(255, 255, 255, 0.5); font-size: 0.95rem; margin-bottom: 30px; }
        .action-box { background: rgba(0, 0, 0, 0.15); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 25px; margin-bottom: 30px; color: rgba(255, 255, 255, 0.8); font-size: 0.95rem; }
        .btn-logout {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; text-decoration: none; padding: 12px 30px; font-weight: 600; border-radius: 12px; transition: all 0.3s ease; width: 100%;
        }
        .btn-logout:hover { background: #ef4444; border-color: #ef4444; color: white; transform: scale(1.02); box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3); }
        .terms-text { font-size: 0.75rem; color: rgba(255, 255, 255, 0.35); line-height: 1.4; }
    </style>
</head>
<body>
<div class="card dashboard-card p-4 p-md-5 text-center">
    <div class="avatar-panel"><i class="bi bi-person-fill"></i></div>
    <h1 class="welcome-title mb-1">Welcome back, <span class="username-highlight">{{ username }}</span>!</h1>
    <p class="status-text">Your secure session is active</p>
    <div class="action-box">
        <i class="bi bi-shield-check-fill text-success fs-4 d-block mb-2"></i>
        <span>You have successfully accessed your customized terminal dashboard. Ready to proceed?</span>
    </div>
    <div class="px-md-5">
        <a href="/logout/" class="btn btn-logout"><i class="bi bi-box-arrow-right"></i>Logout Securely</a>
    </div>
    <div class="terms-text mt-5">
        © 2026 SecurePort Services | Authentication Shield Layer Active.<br>
        Please sign out if leaving this device unattended.
    </div>
</div>
</body>
</html>
